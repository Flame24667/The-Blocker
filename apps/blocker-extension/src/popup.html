<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>The Blocker</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>

  <body>
    <main class="popup-shell">
      <header>
        <h1>The Blocker</h1>
        <p>Browser Helper</p>
      </header>

      <section class="add-domain-section">
        <div class="section-title">
          <h2>Add Domain</h2>
        </div>

        <form id="add-domain-form" class="add-domain-form">
          <input
            id="add-domain-input"
            type="text"
            placeholder="example.com"
            autocomplete="off"
          />

          <button type="submit" class="danger">
            +
          </button>
        </form>

        <p id="add-domain-message" class="form-message hidden"></p>
      </section>

      <section>
        <div class="section-title">
          <h2>Adblock Domains</h2>
          <button id="clear-unblocked-button">Clear Unblocked</button>
        </div>

        <div class="tab-row">
          <button class="tab-button active" data-adblock-tab="Ad">
            Ads
          </button>

          <button class="tab-button" data-adblock-tab="Tracker">
            Trackers
          </button>
        </div>

        <div id="adblock-list" class="list"></div>
      </section>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
