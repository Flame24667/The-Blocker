<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>The Blocker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="./src/main.js"></script>
  </head>

  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>The Blocker</h1>
          <p>Local ad and tracker blocking dashboard</p>
        </div>

        <div class="status-panel">
          <span id="status-badge" data-state="ok">Checking...</span>
          <button id="protection-button">Loading...</button>
          <button id="add-domain-button">Add Domain</button>
        </div>
      </header>

      <section class="card">
        <div class="section-header with-tools">
          <h2>Blocked Ads & Trackers</h2>

          <input
            id="events-search"
            class="search-input"
            type="search"
            placeholder="Search blocked domains..."
          />
        </div>

        <div class="table-wrap scroll-10">
          <table class="blocked-table">
            <thead>
              <tr>
                <th data-events-sort="domain">Domain</th>
                <th data-events-sort="block_count">Count</th>
                <th data-events-sort="last_blocked_at_unix">Last Blocked</th>
                <th data-events-sort="matched_rule">Matched Rule</th>
                <th data-events-sort="rule_source">Source</th>
                <th data-events-sort="domain_type">Type</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="events-body"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <div class="section-header with-tools">
          <h2>Allowed Domains</h2>
          
          <input
            id="allowlist-search"
            class="search-input"
            type="search"
            placeholder="Search allowed domains..."
          />
        </div>

        <div class="table-wrap scroll-10">
          <table class="allowed-table">
            <thead>
              <tr>
                <th data-allowlist-sort="domain">Domain</th>
                <th data-allowlist-sort="domain_type">Type</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="allowlist-body"></tbody>
          </table>
        </div>
      </section>
    </main>
    <div id="add-domain-modal" class="modal-backdrop hidden">
      <div class="modal-card">
        <div class="modal-header">
          <h2>Add Domain</h2>
          <button id="close-add-domain-modal" class="icon-button" aria-label="Close">
            ×
          </button>
        </div>

        <p class="modal-copy">
          Enter a domain you want The Blocker to block.
        </p>

        <form id="add-domain-form" class="modal-form">
          <input
            id="add-domain-input"
            class="modal-input"
            type="text"
            placeholder="example.com"
            autocomplete="off"
          />
          <p id="add-domain-error" class="modal-error hidden"></p>

          <div class="modal-actions">
            <button type="button" id="cancel-add-domain-button" class="secondary">
              Cancel
            </button>

            <button type="submit">
              Add Domain
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
